<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/pokemon-card.css">
    <link rel="stylesheet" href="./styles/pokemon-types.css">
    <link rel="stylesheet" href="./styles/type-filter.css">
</head>

<body onload="init()">

    <header>
        <h1>Pokédex</h1>

        <div>
            <input data-id="search-input" id="searchInput" type="text" placeholder="Search Pokémon...">

            <button data-id="search-button" id="searchButton">
                Search
            </button>
        </div>
        <div id="typeFilter" class="type-filter"></div>
    </header>

    <main data-id="content">
        <section id="pokedex"></section>

        <div class="load-more-wrapper">
            <button data-id="load-more-button" id="loadMoreButton">
                Load more
            </button>
        </div>
    </main>

    <dialog data-id="dialog" id="pokemonDialog"></dialog>

    <script src="./templates.js"></script>
    <script src="./script.js"></script>
</body>

</html>
